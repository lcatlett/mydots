# Claude-optimized tmux config
# Fixes macOS PTY escape sequence bug with Claude Code

# Use 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# CRITICAL: Disable status bar to prevent conflict with Claude Code's status
set -g status off

# Disable mouse (enables native iTerm copy/paste and selection)
set -g mouse off

# Enable clipboard integration
set -g set-clipboard on

# Reduce escape time (faster response, less flicker)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Don't let tmux rename windows
set -g allow-rename off
set -g automatic-rename off

# Disable activity monitoring (can cause redraws)
set -g monitor-activity off
set -g visual-activity off

# Aggressive resize - helps with display issues
set -g aggressive-resize on

# Focus events (helps apps detect window focus)
set -g focus-events on

# Easy reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
